<style>

:root{
  --bg:#080707;
  --bg2:#120f0f;
  --panel:#181414;
  --panel2:#201b1b;
  --gold:#c4aa8a;
  --rose:#7b5656;
  --text:#ece4d7;
  --muted:#a69686;
  --border:rgba(196,170,138,.15);
}

/* reset */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:
    radial-gradient(circle at top, rgba(123,86,86,.08), transparent 40%),
    linear-gradient(180deg, var(--bg), var(--bg2), var(--bg));

  color:var(--text);
  font-family:"Cormorant Garamond",serif;
  line-height:1.8;
  overflow-x:hidden;
}

/* subtle texture veil */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,.015), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255,255,255,.01), transparent 40%);
  pointer-events:none;
  z-index:0;
}

/* NAV (matched style) */
nav{
  position:sticky;
  top:0;
  z-index:999;
  backdrop-filter:blur(12px);
  background:rgba(0,0,0,.5);
  border-bottom:1px solid var(--border);
  text-align:center;
}

nav a{
  color:var(--text);
  text-decoration:none;
  margin:0 15px;
  letter-spacing:2px;
  text-transform:uppercase;
  font-size:.9rem;
  transition:.3s;
}

nav a:hover{
  color:var(--gold);
}

/* title */
h1{
  text-align:center;
  margin:60px 0 30px;
  font-family:"Cinzel",serif;
  letter-spacing:3px;
  color:var(--gold);
}

/* gallery container becomes “curated archive grid” */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
  padding:50px;
  position:relative;
  z-index:2;
}

/* image cards */
.gallery img{
  width:100%;
  border-radius:14px;

  border:1px solid var(--border);
  background:rgba(255,255,255,.02);

  transition:.4s ease;
  cursor:pointer;

  filter:contrast(1.05) saturate(.9);
}

/* hover becomes “breathing relic” effect */
.gallery img:hover{
  transform:translateY(-6px) scale(1.02);
  border-color:rgba(196,170,138,.4);
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

/* optional: soft vignette feel */
.gallery img{
  position:relative;
}

</style>
<style>
body, html {
  min-height: 100%;
}

.container, .gallery, .hero {
  position: relative;
  z-index: 2;
}

body::before {
  z-index: 0;
}
</style>
