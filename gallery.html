<!DOCTYPE html>
<html>
<head>
<title>Gallery | WiltedCamelia</title>

<style>
body{
    background:#0d120f;
    color:#ece6db;
    font-family:Georgia,serif;
    margin:0;
}

nav{
    background:#111;
    padding:20px;
    text-align:center;
}

nav a{
    color:#ece6db;
    text-decoration:none;
    margin:0 15px;
}

h1{
    text-align:center;
    margin:40px 0;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
    padding:40px;
}

.gallery img{
    width:100%;
    border-radius:12px;
    cursor:pointer;
    transition:.3s;
}

.gallery img:hover{
    transform:scale(1.03);
}
</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="gallery.html">Gallery</a>
</nav>

<h1>Artwork Gallery</h1>

<div class="gallery">

<img src="unnamed.png" alt="Artwork">

</div>

</body>
</html>
