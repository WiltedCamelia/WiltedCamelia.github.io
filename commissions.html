<style>

:root{
  --bg:#080707;
  --bg2:#120f0f;
  --panel:#181414;
  --panel2:#201b1b;
  --gold:#c4aa8a;
  --rose:#7b5656;
  --text:#ece4d7;
  --muted:#a69686;
  --border:rgba(196,170,138,.15);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:
    radial-gradient(circle at top, rgba(123,86,86,.08), transparent 40%),
    linear-gradient(180deg, var(--bg), var(--bg2), var(--bg));

  color:var(--text);
  font-family:"Cormorant Garamond",serif;
  line-height:1.8;
  overflow-x:hidden;
}

/* subtle atmospheric texture */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,.015), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255,255,255,.01), transparent 40%);
  pointer-events:none;
  z-index:0;
}

/* NAV (unified aesthetic) */
nav{
  position:sticky;
  top:0;
  z-index:999;
  backdrop-filter:blur(12px);
  background:rgba(0,0,0,.5);
  border-bottom:1px solid var(--border);
  text-align:center;
  padding:18px;
}

nav a{
  color:var(--text);
  text-decoration:none;
  margin:0 15px;
  letter-spacing:2px;
  text-transform:uppercase;
  font-size:.9rem;
  transition:.3s;
}

nav a:hover{
  color:var(--gold);
}

/* layout container */
.container{
  max-width:900px;
  margin:auto;
  padding:60px 25px;
  position:relative;
  z-index:2;
}

/* title */
h1{
  font-family:"Cinzel",serif;
  text-align:center;
  margin-bottom:30px;
  color:var(--gold);
  letter-spacing:3px;
}

/* STATUS BADGE (now feels like a sealed wax stamp) */
.status{
  background:rgba(123,86,86,.15);
  border:1px solid var(--border);
  border-left:4px solid var(--gold);
  padding:15px 18px;
  border-radius:12px;
  margin-bottom:35px;

  color:var(--text);
  letter-spacing:2px;
}

/* PRICING CARDS (now like archived specimen labels) */
.price-box{
  background:rgba(255,255,255,.02);
  border:1px solid var(--border);
  padding:22px;
  border-radius:14px;
  margin-bottom:18px;

  transition:.3s ease;
}

.price-box:hover{
  transform:translateY(-4px);
  border-color:rgba(196,170,138,.35);
  background:rgba(255,255,255,.03);
}

.price-box h2{
  color:var(--gold);
  margin-bottom:6px;
  font-family:"Cinzel",serif;
  letter-spacing:2px;
}

.price-box p{
  color:var(--muted);
  font-size:1.1rem;
}

/* LIST HEADINGS */
h2{
  margin-top:30px;
  color:var(--gold);
  font-family:"Cinzel",serif;
  letter-spacing:2px;
}

/* LIST STYLING */
ul{
  margin-top:10px;
  padding-left:20px;
  color:var(--muted);
}

li{
  margin:6px 0;
}

</style>
