<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WiltedCamelia</title>

<style>
:root{
    --bg:#151915;
    --panel:#202620;
    --accent:#58724D;
    --highlight:#8DAA7B;
    --text:#E8E2D6;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Georgia, serif;
    background:var(--bg);
    color:var(--text);
    line-height:1.6;
}

nav{
    background:#111;
    padding:1rem;
    position:sticky;
    top:0;
}

nav ul{
    display:flex;
    justify-content:center;
    gap:2rem;
    list-style:none;
}

nav a{
    color:var(--text);
    text-decoration:none;
}

nav a:hover{
    color:var(--highlight);
}

.hero{
    min-height:80vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:2rem;
}

.hero h1{
    font-size:4rem;
    margin-bottom:1rem;
}

.hero p{
    max-width:600px;
    margin-bottom:2rem;
}

.button{
    background:var(--accent);
    color:white;
    padding:12px 24px;
    border-radius:8px;
    text-decoration:none;
}

.button:hover{
    background:var(--highlight);
}

section{
    padding:4rem 10%;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:1.5rem;
}

.card{
    background:var(--panel);
    border-radius:12px;
    overflow:hidden;
}

.placeholder{
    height:250px;
    background:#2e382e;
    display:flex;
    align-items:center;
    justify-content:center;
}

.card-content{
    padding:1rem;
}

footer{
    text-align:center;
    padding:2rem;
    background:#111;
}
</style>

</head>

<body>

</ul>
</nav>

<p>

<br><br>

</p>

</div>

<footer>

</footer>

</body>
</html>
