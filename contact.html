<style>

:root{
  --bg:#080707;
  --bg2:#120f0f;
  --panel:#181414;
  --panel2:#201b1b;
  --gold:#c4aa8a;
  --rose:#7b5656;
  --text:#ece4d7;
  --muted:#a69686;
  --border:rgba(196,170,138,.15);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:
    radial-gradient(circle at top, rgba(123,86,86,.08), transparent 40%),
    linear-gradient(180deg, var(--bg), var(--bg2), var(--bg));

  color:var(--text);
  font-family:"Cormorant Garamond",serif;
  line-height:1.8;
  overflow-x:hidden;
}

/* atmospheric veil */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,.015), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255,255,255,.01), transparent 40%);
  pointer-events:none;
  z-index:0;
}

/* NAV */
nav{
  position:sticky;
  top:0;
  z-index:999;
  backdrop-filter:blur(12px);
  background:rgba(0,0,0,.5);
  border-bottom:1px solid var(--border);
  text-align:center;
  padding:18px;
}

nav a{
  color:var(--text);
  text-decoration:none;
  margin:0 15px;
  letter-spacing:2px;
  text-transform:uppercase;
  font-size:.9rem;
  transition:.3s;
}

nav a:hover{
  color:var(--gold);
}

/* container */
.container{
  max-width:800px;
  margin:auto;
  padding:70px 25px;
  position:relative;
  z-index:2;
}

/* title */
h1{
  text-align:center;
  font-family:"Cinzel",serif;
  color:var(--gold);
  margin-bottom:40px;
  letter-spacing:3px;
}

/* CONTACT CARDS → now like labeled glass correspondence slips */
.contact-box{
  background:rgba(255,255,255,.02);
  border:1px solid var(--border);
  border-radius:14px;
  padding:22px;
  margin-bottom:18px;

  transition:.3s ease;
  position:relative;
  overflow:hidden;
}

/* soft glow hover */
.contact-box:hover{
  transform:translateY(-4px);
  border-color:rgba(196,170,138,.35);
  background:rgba(255,255,255,.03);
}

/* subtle “light sweep” effect */
.contact-box::before{
  content:"";
  position:absolute;
  top:0;
  left:-60%;
  width:50%;
  height:100%;
  background:linear-gradient(90deg, transparent, rgba(196,170,138,.08), transparent);
  transform:skewX(-20deg);
  transition:.6s;
}

.contact-box:hover::before{
  left:120%;
}

/* text styling */
.contact-box h3{
  color:var(--gold);
  font-family:"Cinzel",serif;
  letter-spacing:2px;
  margin-bottom:6px;
}

.contact-box p{
  color:var(--muted);
}

/* optional link feel if you later turn them into clickable items */
.contact-box p:hover{
  color:var(--text);
}

</style>
