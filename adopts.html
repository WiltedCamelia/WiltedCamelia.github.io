<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registry | WiltedCamelia</title>

<style>

/* 🌙 CORE PALETTE */
body{
    margin:0;
    font-family: Georgia, serif;
    background:
      radial-gradient(circle at top, #151a16, #0b0f0c 70%);
    color:#e8e1d6;
}

/* 🕯 NAVIGATION (ARCHIVE PLAQUES) */
nav{
    padding:18px;
    text-align:center;
    background:rgba(10,12,10,0.85);
    border-bottom:1px solid rgba(255,255,255,0.06);
    letter-spacing:2px;
    text-transform:uppercase;
    font-size:12px;
}

nav a{
    color:#e8e1d6;
    text-decoration:none;
    margin:0 14px;
    opacity:0.75;
    transition:0.2s ease;
}

nav a:hover{
    opacity:1;
}

/* 🥀 HEADER */
h1{
    text-align:center;
    margin-top:50px;
    font-size:42px;
    letter-spacing:3px;
}

.subtitle{
    text-align:center;
    opacity:0.7;
    font-style:italic;
    margin-bottom:50px;
}

/* 🌿 GRID SYSTEM */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:22px;
    padding:40px;
}

/* 📖 SPECIMEN CARD */
.card{
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(180,255,200,0.08);
    border-radius:14px;
    overflow:hidden;
    position:relative;
    transition:0.25s ease;
    backdrop-filter: blur(6px);
}

/* subtle greenhouse lift */
.card:hover{
    transform:translateY(-6px);
    border-color:rgba(180,255,200,0.2);
}

/* 🧬 IMAGE */
.card img{
    width:100%;
    display:block;
    filter:contrast(1.05) saturate(0.9);
}

/* 🪶 INFO BLOCK */
.info{
    padding:16px;
}

.info h3{
    margin:0;
    font-size:18px;
    letter-spacing:1px;
}

/* 🏷 STATUS */
.available{
    color:#a6f3b0;
    font-weight:bold;
    font-size:13px;
    margin-top:6px;
}

.sold{
    color:#ff8f9a;
    font-weight:bold;
    font-size:13px;
}

/* 💰 PRICE */
.price{
    margin-top:8px;
    font-size:13px;
    opacity:0.8;
}

/* 🕯 SMALL “ARCHIVE LABEL” FEEL */
.card::before{
    content:"SPECIMEN FILE";
    position:absolute;
    top:10px;
    left:10px;
    font-size:10px;
    letter-spacing:2px;
    opacity:0.35;
}

/* 🌿 OPTIONAL GLASS GLOW */
.card:hover::after{
    content:"";
    position:absolute;
    inset:0;
    background:radial-gradient(circle at center, rgba(120,255,170,0.08), transparent 60%);
    pointer-events:none;
}

</style>
</head>

<body>

<nav>
<a href="index.html">Archive</a>
<a href="gallery.html">Conservatory</a>
<a href="adopts.html">Registry</a>
<a href="#">Ledger</a>
<a href="#">Garden Gate</a>
</nav>

<h1>Specimen Registry</h1>

<p class="subtitle">
Catalogued entities preserved within the greenhouse archive
</p>

<div class="grid">

    <!-- 🥀 CARD 1 -->
    <div class="card">
        <img src="unnamed.png" alt="Adopt">

        <div class="info">
            <h3>Forest Fox</h3>
            <p class="available">Available</p>
            <p class="price">$35 AUD</p>
        </div>
    </div>

    <!-- 🥀 CARD 2 -->
    <div class="card">
        <img src="unnamed.png" alt="Adopt">

        <div class="info">
            <h3>Moth Dragon</h3>
            <p class="available">Available</p>
            <p class="price">$35 AUD</p>
        </div>
    </div>

</div>

</body>
</html>
